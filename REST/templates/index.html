<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 1200px;
            background-color: darkgray;
        }
        div{
            width:400px;
            height: 400px;
            background-color: burlywood;
            margin: 10px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        input{
            height: 30px;
            width: 200px;
            border-radius: 5px;
            border: 1px solid burlywood;
            margin-top: 80px;
            margin-bottom: 20px;

        }
        button{
            margin-bottom: 20px;
        }
        h1{
            margin-top: 20px;
        }
        button:hover {
          background-color: rgb(255, 239, 16);
          cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <h1>Weather App 🌤️</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required><br>
        <button type="submit">Get Weather</button>
    </form>

    {% if weather %}
        {% if weather.error %}
            <p>{{ weather.error }}</p>
        {% else %}
            <h2>{{ weather.city }}</h2>
            <p>Temperature: {{ weather.temp }} °C</p>
            <p>Condition: {{ weather.desc }}</p>
        {% endif %}
    {% endif %}
    </div>
    
</body>
</html>
